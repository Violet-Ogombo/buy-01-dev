name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'buy-01-frontend/**'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write   # Needed to push to gh-pages branch

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: buy-01-frontend/package-lock.json

      - name: Install dependencies
        working-directory: buy-01-frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: buy-01-frontend
        run: npm run build:github

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: buy-01-frontend/dist/buy-01-frontend/browser
          # Ensures Angular router works — all 404s fall back to index.html
          enable_jekyll: false
