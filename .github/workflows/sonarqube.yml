name: SonarQube Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-with-jenkins:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Trigger Jenkins Build
        id: trigger
        run: |
          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          JENKINS_USER="${{ secrets.JENKINS_USER }}"
          JENKINS_TOKEN="${{ secrets.JENKINS_TOKEN }}"
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          
          # Trigger Jenkins build
          RESPONSE=$(curl -s -X POST \
            "$JENKINS_URL/job/buy-01-dev/buildWithParameters" \
            -u "$JENKINS_USER:$JENKINS_TOKEN" \
            -d "BRANCH_NAME=$BRANCH_NAME" \
            -d "GIT_COMMIT=${{ github.sha }}")
          
          echo "Jenkins build triggered"
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Wait for Jenkins Build Completion
        id: wait
        run: |
          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          JENKINS_USER="${{ secrets.JENKINS_USER }}"
          JENKINS_TOKEN="${{ secrets.JENKINS_TOKEN }}"
          MAX_ATTEMPTS=120
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            BUILD_STATUS=$(curl -s -u "$JENKINS_USER:$JENKINS_TOKEN" \
              "$JENKINS_URL/job/buy-01-dev/lastBuild/api/json" \
              | grep -o '"result":"[^"]*"' | cut -d'"' -f4)
            
            if [ "$BUILD_STATUS" = "SUCCESS" ] || [ "$BUILD_STATUS" = "FAILURE" ] || [ "$BUILD_STATUS" = "UNSTABLE" ]; then
              echo "status=$BUILD_STATUS" >> $GITHUB_OUTPUT
              break
            fi
            
            echo "Build in progress... ($ATTEMPT/120)"
            ATTEMPT=$((ATTEMPT + 1))
            sleep 5
          done

      - name: Report Status to GitHub
        if: always()
        run: |
          BUILD_STATUS="${{ steps.wait.outputs.status }}"
          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          
          if [ "$BUILD_STATUS" = "SUCCESS" ]; then
            echo "✅ Jenkins build SUCCESS - SonarQube Quality Gate PASSED"
            exit 0
          elif [ "$BUILD_STATUS" = "UNSTABLE" ]; then
            echo "⚠️  Jenkins build UNSTABLE - Check SonarQube results at: $JENKINS_URL/job/buy-01-dev/lastBuild/"
            exit 1
          else
            echo "❌ Jenkins build FAILED - Review at: $JENKINS_URL/job/buy-01-dev/lastBuild/"
            exit 1
          fi