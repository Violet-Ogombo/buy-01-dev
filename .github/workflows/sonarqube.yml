name: SonarQube Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Build and test API Gateway
        run: mvn clean verify -f api-gateway/pom.xml
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build and test Discovery Service
        run: mvn clean verify -f discovery-server/pom.xml
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build and test Product Service
        run: mvn clean verify -f product-service/pom.xml
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build and test Media Service
        run: mvn clean verify -f media-service/pom.xml
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build and test Identity Service
        run: mvn clean verify -f identity-service/pom.xml
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Run SonarQube Analysis
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: violet-ogombo
          SONAR_PROJECT_KEY: buy-01-dev

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@8e9b0ca0a7273d6f16986388d98393efdfcf56fd
        timeout-minutes: 5
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}