<div class="search-filter-container">
  <div class="filter-card">
    <!-- Header -->
    <div class="filter-header">
      <div>
        <h2>Search Catalog</h2>
        <p class="filter-description">Use keyword, category, and price filters to narrow the product grid.</p>
      </div>
      <button (click)="resetFilters()" class="btn-reset-filters">Reset Filters</button>
    </div>

    <!-- Keyword Search -->
    <div class="filter-row">
      <div class="filter-group">
        <label>Keyword</label>
        <input
          type="text"
          placeholder="Search products"
          [(ngModel)]="keyword"
          (ngModelChange)="onFilterChange()"
          class="search-input"
        />
      </div>

      <!-- Category Dropdown -->
      <div class="filter-group">
        <label>Category</label>
        <select [(ngModel)]="category" (ngModelChange)="onFilterChange()" class="category-select">
          <option *ngFor="let cat of categories" [value]="cat.value">{{ cat.label }}</option>
        </select>
      </div>
    </div>

    <!-- Price Range Sliders -->
    <div class="filter-row price-row">
      <div class="price-group">
        <label>Minimum Price: ${{ minPrice }}</label>
        <input
          type="range"
          min="0"
          max="5000"
          [(ngModel)]="minPrice"
          (ngModelChange)="onFilterChange()"
          class="price-slider"
        />
      </div>

      <div class="price-group">
        <label>Maximum Price: ${{ maxPrice }}</label>
        <input
          type="range"
          min="0"
          max="5000"
          [(ngModel)]="maxPrice"
          (ngModelChange)="onFilterChange()"
          class="price-slider"
        />
      </div>
    </div>

    <!-- Filter Summary -->
    <div class="filter-summary">
      <span class="active-filters">{{ activeFilterCount }} active filters</span>
      <span class="product-count">Showing {{ filteredProducts }} of {{ totalProducts }} products</span>
    </div>
  </div>
</div>
