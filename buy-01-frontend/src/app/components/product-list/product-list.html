<div class="product-list-container page-container">
  <h1 class="page-title">Products</h1>
  
  <div *ngIf="error" class="error-container">
    <p>{{ error }}</p>
    <button class="btn-primary-main" type="button" (click)="loadProducts()">Retry</button>
  </div>
  
  <ng-container *ngIf="!error">
    <!-- Filter Component -->
    <app-product-filter
      [currentFilters]="currentFilters"
      [totalProducts]="allProducts.length"
      [filteredProducts]="displayedProductsCount"
      (filterChange)="onFilterChange($event)"
    ></app-product-filter>

    <div *ngIf="filteredProducts.length > 0" class="products-grid">
      <div *ngFor="let product of paginatedProducts; trackBy: trackByProductId" class="product-card" [routerLink]="['/products', product.id]">
        <!-- Wishlist toggle heart button -->
        <button
          *ngIf="product.id"
          (click)="toggleWishlist(product, $event)"
          class="wishlist-btn"
          [class.active]="isInWishlist(product.id)"
          [title]="isInWishlist(product.id) ? 'Remove from Wishlist' : 'Add to Wishlist'"
        >
          ❤️
        </button>

        <div class="image-wrapper">
          <img
            *ngIf="product.imageUrls && product.imageUrls.length"
            [src]="product.imageUrls[0]"
            alt="Product image"
            class="product-image"
            (error)="onImageLoadError($event)"
          />
          <div *ngIf="!product.imageUrls || product.imageUrls.length === 0" class="no-image-placeholder">📦</div>
        </div>

        <div class="card-body">
          <h3>{{ product.name }}</h3>
          <p class="description">{{ product.description }}</p>
          <p class="price">${{ product.price }}</p>
          
          <div class="stock-status-row">
            <span class="status-badge" [class.out]="product.quantity === 0">
              {{ product.quantity > 0 ? 'In Stock (' + product.quantity + ')' : 'Out of Stock' }}
            </span>
          </div>

          <!-- Quick Cart Actions -->
          <div class="quick-add-section" *ngIf="product.quantity > 0 && isUserLoggedIn()">
            <select #qtySelect (click)="$event.stopPropagation()" class="qty-select">
              <option *ngFor="let q of [1,2,3,4,5]" [value]="q">{{ q }}</option>
            </select>
            <button (click)="addToCart(product, $event, qtySelect.value)" class="btn-quick-add">Add</button>
          </div>

          <span class="view-details">View Details &rarr;</span>
        </div>
      </div>
    </div>

    <div *ngIf="filteredProducts.length === 0" class="no-products">
      No products match the current filters.
    </div>

    <div *ngIf="filteredProducts.length > 0 && totalPages > 1" class="pagination">
      <button (click)="changePage(-1)" [disabled]="currentPage === 1">Previous</button>
      <span>Page {{ currentPage }} of {{ totalPages }}</span>
      <button (click)="changePage(1)" [disabled]="currentPage === totalPages">Next</button>
    </div>
  </ng-container>
</div>
