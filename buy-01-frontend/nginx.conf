# Nginx configuration for Angular frontend
# Serves the built Angular application and proxies API calls to the backend gateway

server {
    listen 80;
    server_name _;
    
    # Set root directory
    root /usr/share/nginx/html;
    
    # Disable gzip - backend handles compression
    gzip off;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    
    # Cache control for static assets
    # Set cache time to 1 year for hashed files (build artifacts)
    location ~* \.(js|css|webp|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Don't cache HTML files (allow quick updates)
    location ~ \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    
    # Don't cache the root index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    
    # API proxy configuration
    # Proxy all requests starting with /api to the backend gateway
    location /api/ {
        proxy_pass http://api-gateway:8080;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Disable proxy buffering to avoid chunked encoding issues
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Disable chunked transfer encoding - use content-length instead
        chunked_transfer_encoding off;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Main location - serve Angular app
    location / {
        # Serve index.html for all non-file requests (SPA routing)
        try_files $uri $uri/ /index.html;
        
        # Set proper content type for index.html
        types {
            text/html html;
        }
        
        # Don't cache
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
