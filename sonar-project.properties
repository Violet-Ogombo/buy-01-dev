# Project Identification
sonar.projectKey=buy-01-dev
sonar.projectName=buy-01-dev
sonar.projectVersion=1.0.0
sonar.organization=violet-ogombo

# Code Analysis
sonar.sources=.
sonar.java.binaries=**/target/classes
sonar.java.libraries=**/target/dependency/**

# Language and Encoding
sonar.language=java
sonar.sourceEncoding=UTF-8

# Test Reports
sonar.junit.reportPaths=**/target/surefire-reports
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# Exclusions (Build artifacts, dependencies, generated code, tests)
sonar.exclusions=\
  **/node_modules/**,\
  **/.git/**,\
  **/target/**,\
  **/dist/**,\
  **/*.min.js,\
  **/src/test/**,\
  **/*Test.java,\
  **/generated-sources/**,\
  **/.angular/**,\
  **/package-lock.json,\
  **/package.json,\
  **/*.yml,\
  **/*.yaml,\
  **/*.xml,\
  **/*.properties,\
  **/Dockerfile,\
  **/.dockerignore,\
  **/.gitignore

# Code Smells and Security
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1118
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.java