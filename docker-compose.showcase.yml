# Docker Compose override for showcase/demo purposes.
# Excludes Jenkins and SonarQube to reduce resource usage.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.showcase.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.showcase.yml down
#
# This starts: zookeeper, kafka, kafka-init, mongodb,
#              discovery-server, identity-service, product-service,
#              media-service, api-gateway, nginx, frontend

name: buy-01-showcase

services:
  # Disable Jenkins in showcase mode (CI/CD not needed for demo)
  jenkins:
    profiles:
      - local-only

  # Disable SonarQube in showcase mode (code quality not needed for demo)
  sonarqube:
    profiles:
      - local-only

  # Disable SonarQube DB in showcase mode
  sonarqube-db:
    profiles:
      - local-only
