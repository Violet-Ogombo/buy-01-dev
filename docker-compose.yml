# Docker Compose configuration for Buy-01 E-Commerce Microservices Platform
# This orchestrates all services needed for the application to run

services:
  # ==================== Infrastructure Services ====================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network
    command: >
      bash -c "
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user-registered --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic product-created --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic product-updated --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic product-deleted --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic image-uploaded --replication-factor 1 --partitions 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit-log --replication-factor 1 --partitions 1 &&
        echo 'All topics created successfully.'
      "

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: buy01
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Backend Microservices ====================

  discovery-server:
    container_name: discovery-server
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: discovery-server
      EUREKA_CLIENT_REGISTERWITEUREKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  identity-service:
    container_name: identity-service
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: identity-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/buy01
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      discovery-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  product-service:
    container_name: product-service
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_APPLICATION_NAME: product-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/buy01
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      discovery-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  media-service:
    container_name: media-service
    build:
      context: ./media-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: media-service
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/buy01
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      discovery-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - media_uploads:/app/uploads/images
    networks:
      - app-network
    restart: unless-stopped

  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Reverse Proxy (HTTPS/SSL Termination) ====================

  nginx:
    container_name: nginx-reverse-proxy
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./keystore/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
    networks:
      - app-network
    restart: unless-stopped

  # ==================== Frontend ====================
  # Note: Frontend is served through Nginx reverse proxy (ports 80/443)
  # No direct port exposure needed

  frontend:
    container_name: frontend
    build:
      context: ./buy-01-frontend
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

# ==================== Networks & Volumes ====================

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  media_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/uploads
